<button id="vrButton">Enter VR</button>

<div id="hoverTooltip" class="hover-tooltip hidden"></div>

<!-- POPUP (ainda pronto pra você usar depois) -->
<div id="popup" class="popup hidden">
  <h2>Detalhes da Máquina</h2>
  <p id="popupText">Clique em um hotspot</p>
  <button onclick="closePopup()">Fechar</button>
</div>

<!-- ================= SCENE ================= -->

<a-scene vr-mode-ui="enabled: true" loading-screen="backgroundColor: black; dotsColor: white">

  <!-- MODELOS -->
  <a-assets>
    <a-asset-item id="model1" src="model1.glb"></a-asset-item>
    <a-asset-item id="model2" src="model2.glb"></a-asset-item>
  </a-assets>

  <!-- FUNDO -->
  <a-sky color="#000000"></a-sky>

  <!-- LUZES -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; intensity: 1.2" position="2 4 3"></a-entity>

  <!-- ================= OBJETO 1 ================= -->
  <a-entity id="wrapper1" position="-1.5 1.35 -3">
    <a-entity
      id="obj1"
      class="clickable"
      gltf-model="#model1"
      scale="1.35 1.35 1.35"
      data-tooltip-image="public/card1.png"
      data-tooltip-side="left"
      floaty
      hover-zoom
      hover-tooltip
      drag-rotate="target: #wrapper1">
    </a-entity>
  </a-entity>

  <!-- ================= OBJETO 2 ================= -->
  <a-entity id="wrapper2" position="1.5 1.35 -3" rotation="0 -45 0">
    <a-entity
      id="obj2"
      class="clickable"
      gltf-model="#model2"
      scale="1.35 1.35 1.35"
      rotation="0 0 90"
      data-tooltip-image="public/card2.png"
      data-tooltip-side="right"
      floaty
      hover-zoom
      hover-tooltip
      drag-rotate="target: #wrapper2">
    </a-entity>
  </a-entity>

  <!-- CAMERA (IMPORTANTE PARA CLIQUE FUNCIONAR) -->
  <a-camera
    look-controls
    wasd-controls
    raycaster="objects: .clickable"
    cursor="rayOrigin: mouse">
  </a-camera>

</a-scene>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
