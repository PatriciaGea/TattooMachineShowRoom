<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">Tattoo Machine Showroom</div>

<!-- FOOTER -->
<div class="footer">Use mouse para explorar • clique no ponto vermelho</div>

<a-scene>

  <!-- ASSETS (SEUS MODELOS) -->
  <a-assets>
    <a-asset-item id="model1" src="model1.glb"></a-asset-item>
    <a-asset-item id="model2" src="model2.glb"></a-asset-item>
  </a-assets>

  <!-- FUNDO INFINITO PRETO -->
  <a-sky color="#000000"></a-sky>

  <!-- LUZES (REALISTA SIMPLES) -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="2 4 3"></a-entity>

  <!-- MODELO 1 -->
  <a-entity
    id="obj1"
    gltf-model="#model1"
    position="-1 1 -3"
    scale="0.6 0.6 0.6"
    floaty="speed: 1"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
  </a-entity>

  <!-- MODELO 2 -->
  <a-entity
    id="obj2"
    gltf-model="#model2"
    position="1 1 -3"
    scale="0.6 0.6 0.6"
    floaty="speed: 1.3"
    animation="property: rotation; to: 0 -360 0; loop: true; dur: 15000">
  </a-entity>

  <!-- PONTO VERMELHO (HOTSPOT) -->
  <a-sphere
    id="hotspot"
    position="0 1.8 -2.5"
    radius="0.05"
    color="red"
    class="clickable">
  </a-sphere>

  <!-- CÂMERA -->
  <a-camera look-controls wasd-controls position="0 1.6 0"></a-camera>

</a-scene>

<script src="script.js"></script>

</body>
</html>
