<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- partículas -->
 
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- UI -->
<div class="navbar">Tattoo Machine Showroom</div>

<div class="footer">
  Mouse: explorar • Hover: zoom • Clique: info • VR disponível
</div>

<!-- BOTÃO VR -->
<button id="vrButton">Entrar em VR</button>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <h2>Detalhes da Máquina</h2>
  <p id="popupText">Texto aqui...</p>
  <button onclick="closePopup()">Fechar</button>
</div>

<a-scene vr-mode-ui="enabled: true">

  <a-assets>
    <a-asset-item id="model1" src="model1.glb"></a-asset-item>
    <a-asset-item id="model2" src="model2.glb"></a-asset-item>
  </a-assets>

  <!-- FUNDO PRETO -->
  <a-sky color="#000000"></a-sky>



  <!-- LUZES -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; intensity: 1.2" position="2 4 3"></a-entity>

  <a-entity
  id="obj1"
  gltf-model="#model1"
  position="-1.5 1 -3"
  scale="1.2 1.2 1.2"
  floaty="speed: 1"
  mouse-follow="intensity: 0.8">
</a-entity>

<a-entity
  id="obj2"
  gltf-model="#model2"
  position="1.5 1 -3"
  scale="1.2 1.2 1.2"
  floaty="speed: 1.2"
  mouse-follow="intensity: 1.2">
</a-entity>

  <!-- HOTSPOT -->
  <a-sphere
    id="hotspot"
    position="0 2 -2.5"
    radius="0.06"
    color="red">
  </a-sphere>

  <!-- CÂMERA -->
  <a-camera look-controls wasd-controls position="0 1.6 0"></a-camera>

</a-scene>

<script src="script.js"></script>

</body>
</html>
